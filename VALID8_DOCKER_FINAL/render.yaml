# render.yaml
version: "1"

services:
  # Backend FastAPI Service (Docker)
  - type: web
    name: valid8-backend
    runtime: docker
    rootDir: ./Backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: valid8-db
          property: connectionString

  # Frontend Vite React App (Static Site)
  - type: web
    name: valid8-frontend
    runtime: static
    rootDir: ./Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: valid8-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: valid8-db
    databaseName: fastapi_db
    user: postgres
